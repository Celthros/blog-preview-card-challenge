<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
		  rel="stylesheet">
	<link rel="preload" href="style.min.css" as="style" onload="this.rel='stylesheet'">
	<noscript><link rel="stylesheet" href="style.min.css"></noscript>
	<title>Frontend Mentor | Blog preview card</title>
</head>
<body>
	<main>
		<article class="blog-card">
			<figure class="blog-card__image">
				<img src="assets/images/illustration-article.svg" alt="illustration Article">
			</figure>
			<section>
				<div class="blog-card__categories">
					<span class="blog-card__tag">Learning</span>
				</div>
				<time class="blog-card__date" datetime="2023-12-21">Published 21 Dec 2023</time>
				<h2 class="blog-card__title">HTML &amp; CSS foundations</h2>
				<p class="blog-card__description">
					These languages are the backbone of every website, defining structure, content, and presentation.
				</p>
			</section>
			<footer class="blog-card__footer">
				<img src="assets/images/image-avatar.webp" alt="Author - Greg Hooper" class="blog-card__author-avatar">
				<span class="blog-card__author">Greg Hooper</span>
			</footer>
		</article>
	</main>
</body>
</html>
